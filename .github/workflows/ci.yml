name: CI

on:
  push:
    branches:
      - main
      - "feat/*"
      - "fix/*"
      - "chore/*"
      - "docs/*"
      - "refactor/*"
      - "test/*"
      - "style/*"
      - "ci/*"
      - "perf/*"
      - "build/*"
      - "revert/*"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc -b
      - run: npm test
      - run: npm run build
